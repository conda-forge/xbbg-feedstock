{% set name = "xbbg" %}
{% set version = "1.0.0rc1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/alpha-xone/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 4e054ab0322b763468b8e14115f278f07a4f411fa0b81e40309fbcf7ea694516

build:
  number: 0
  skip: true  # [osx and x86_64]
  script:
    - export PIP_NO_INDEX=false                                                                                                # [unix]
    - set PIP_NO_INDEX=false                                                                                                   # [win]
    - {{ PYTHON }} -m pip install {{ name }}=={{ version }} --no-deps --no-cache-dir --pre --index-url https://pypi.org/simple -vv

requirements:
  host:
    - python {{ python_min }}.*
    - pip
  run:
    - python
    - narwhals >=1.30
    - pyarrow >=22.0.0
    - blpapi

test:
  imports:
    - xbbg
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/alpha-xone/xbbg
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Intuitive Bloomberg data API
  doc_url: https://xbbg.readthedocs.io
  dev_url: https://github.com/alpha-xone/xbbg

extra:
  recipe-maintainers:
    - kj55-dev
    - makoponi
