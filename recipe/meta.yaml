{% set name = "xbbg" %}
{% set version = "1.0.0b7" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/alpha-xone/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 65e8978f723eb1e8d2b82a871e437e8b50ba40891d2882cbeb5157227f111ca2

build:
  number: 0
  skip: true  # [osx and x86_64]
  script:
    - {{ PYTHON }} -m pip install {{ name }}=={{ version }} --no-deps --no-cache-dir --index-url https://pypi.org/simple -vv

requirements:
  host:
    - python {{ python_min }}.*
    - pip
  run:
    - python
    - narwhals >=1.30
    - pyarrow >=22.0.0
    - libblpapi

test:
  imports:
    - xbbg
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/alpha-xone/xbbg
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Intuitive Bloomberg data API
  doc_url: https://xbbg.readthedocs.io
  dev_url: https://github.com/alpha-xone/xbbg

extra:
  recipe-maintainers:
    - kj55-dev
    - makoponi
