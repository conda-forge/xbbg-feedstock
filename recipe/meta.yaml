package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # Keep the sdist for metadata/license capture, and package the matching upstream wheel locally.
  - url: https://files.pythonhosted.org/packages/58/3a/cf52c61a2f9701375b867719c039fdd28f6b4bf38ec30ea1fd2c0f30583d/xbbg-1.0.0.tar.gz
    sha256: 3482342d0260e8e7c7d92e0ef89c0cb2d562cf5a09673ebf000da33c06425856
    folder: sdist
  - url: {{ wheel["url"] }}
    sha256: {{ wheel["sha256"] }}
    fn: {{ wheel_filename }}

build:
  number: 0
  skip: true  # [py<310 or (osx and x86_64)]
  script:
    - export PIP_NO_INDEX=false                                                                                                # [unix]
    - set PIP_NO_INDEX=false                                                                                                   # [win]
    # Package the verified wheel artifact locally while preserving the matrix interpreter.
    - {{ PYTHON }} -m pip install ./{{ wheel_filename }} --no-deps --no-cache-dir -vv

requirements:
  host:
    - python
    - pip
  run:
    - python
    - narwhals >=1.30
    - pyarrow >=22.0.0
    - blpapi

test:
  imports:
    - xbbg
  requires:
    - python

about:
  home: https://github.com/alpha-xone/xbbg
  license: Apache-2.0
  license_family: Apache
  license_file: sdist/LICENSE
  summary: Intuitive Bloomberg data API
  doc_url: https://alpha-xone.github.io/xbbg
  dev_url: https://github.com/alpha-xone/xbbg

extra:
  recipe-maintainers:
    - kj55-dev
    - makoponi
